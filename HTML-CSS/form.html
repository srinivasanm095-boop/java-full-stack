<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form>
        <p>
            Name:<input type="text" placeholder="Fazil"><br>
            Age: <input type="number" placeholder="20"><br>
            Email: <input type="mail" placeholder="123@gmail.com"><br>
            Gender: <input type="radio" name="gender" id="1">Male
            <input type="radio" name="gender" id="2">Female
            <input type="radio" name="gender" id="3">Don't want to mention <br>
            Qualifications: <input type="checkbox" name="qualifications" id="1">10 <sup>th</sup>
            <input type="checkbox" name="qualifications" id="2">12 <sup>th</sup>
            <input type="checkbox" name="qualifications" id="3"> Degree
            <input type="checkbox" name="qualifications" id="4"> Masters
            <input type="checkbox" name="qualifications" id="5">PHD <br>
            password: <input type="password" placeholder="123456...."> <br>
            date: <input type="date"> <br>
            time: <input type="time" name="" id=""><br>
            <button type="submit">Submit</button>
            <button type="reset">clear</button>
        </p>
    </form>
</body>
</html>
